services:
  backend:
    build:
      context: ./src/backend
    container_name: scholarmatch-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - ./src/backend/.env
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://${DEPLOYMENT_HOST:-localhost}:5173,https://${DEPLOYMENT_HOST:-localhost}}
    restart: always

  frontend:
    build:
      context: ./src/frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://${DEPLOYMENT_HOST:-localhost}:8000}
    container_name: scholarmatch-frontend-prod
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
